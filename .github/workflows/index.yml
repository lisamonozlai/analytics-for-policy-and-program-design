name: Request Google Indexing

on:
  workflow_dispatch:

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests google-auth

      - name: Create script file
        run: |
          echo "import json" > script.py
          echo "import requests" >> script.py
          echo "from google.oauth2 import service_account" >> script.py
          echo "from google.auth.transport.requests import AuthorizedSession" >> script.py
          echo "" >> script.py
          echo "SCOPES = ['https://www.googleapis.com/auth/indexing']" >> script.py
          echo "credentials = service_account.Credentials.from_service_account_file('key.json', scopes=SCOPES)" >> script.py
          echo "authed_session = AuthorizedSession(credentials)" >> script.py
          echo "" >> script.py
          echo "url = 'https://github.com/lisamonozlai/analytics-for-policy-and-program-design'" >> script.py
          echo "" >> script.py
          echo "body = {'url': url, 'type': 'URL_UPDATED'}" >> script.py
          echo "" >> script.py
          echo "response = authed_session.post('https://indexing.googleapis.com/v3/urlNotifications:publish', json=body)" >> script.py
          echo "print('Status:', response.status_code)" >> script.py
          echo "print('Response:', response.text)" >> script.py

      - name: Run indexing request
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS" > key.json
          python3 script.py
